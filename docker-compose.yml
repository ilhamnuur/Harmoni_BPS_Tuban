version: '3.8'

services:
  # The Laravel app container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: harmoni-bps-tuban-app
    container_name: harmoni_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - harmoni-network
    depends_on:
      - redis

  # The Laravel queue worker container
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: harmoni-bps-tuban-app
    container_name: harmoni_worker
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    volumes:
      - ./storage:/var/www/storage
      - ./public/storage:/var/www/public/storage
    networks:
      - harmoni-network
    depends_on:
      - redis

  # The Nginx web server container
  web:
    image: nginx:alpine
    container_name: harmoni_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - harmoni-network
    depends_on:
      - app

  # The Redis container
  redis:
    image: redis:alpine
    container_name: harmoni_redis
    restart: unless-stopped
    networks:
      - harmoni-network

networks:
  harmoni-network:
    driver: bridge
